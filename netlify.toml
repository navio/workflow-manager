[build]
  base = "apps/remote-registry"
  command = "bun run build"
  publish = "dist"

[build.environment]
  BUN_VERSION = "1.1.42"

[context.production]
  command = "bun run build"

[context.deploy-preview]
  command = "bun run build"

[context.branch-deploy]
  command = "bun run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "bun run dev"
  targetPort = 5173
  framework = "#custom"
