name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            output: workflow-manager-macos-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            output: workflow-manager-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            output: workflow-manager-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build TypeScript output
        run: bun run build

      - name: Compile binary
        run: bun build ./src/index.ts --compile --target ${{ matrix.target }} --outfile ./dist/${{ matrix.output }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ./dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./release-assets/workflow-manager-macos-arm64/workflow-manager-macos-arm64
            ./release-assets/workflow-manager-linux-x64/workflow-manager-linux-x64
            ./release-assets/workflow-manager-windows-x64.exe/workflow-manager-windows-x64.exe
